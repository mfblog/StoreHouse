# 工作流名称
name: Release mosdns

# 工作流的触发条件
on:
  workflow_dispatch:  # 允许在 GitHub 页面上手动触发
  schedule:
    - cron: "30 20 * * *"  # 定时触发：每天 UTC 时间 20:30
  push:
    branches:
      - latest  # 仅在 'latest' 分支有推送时触发
    paths:
      - ".github/workflows/mosdns.yaml" # 当此工作流文件本身发生变化时也触发

# 工作流的任务
jobs:
  build-release:
    # 运行此任务的虚拟机环境
    runs-on: ubuntu-latest
    # 任务包含的步骤
    steps:
      # 第1步：克隆上游的 mosdns 仓库
      - name: 克隆 mosdns 仓库
        uses: actions/checkout@v4
        with:
          repository: yyysuo/mosdns  # 指定要克隆的仓库
          path: mosdns                 # 克隆到名为 'mosdns' 的子目录中
          fetch-depth: 0              # 获取所有 git 历史记录，以便生成版本信息

      # 第2步：生成唯一的版本号和 Commit 信息
      - name: 生成版本信息
        id: version # 给这个步骤一个ID，方便后续步骤引用其输出
        run: |
          cd mosdns
          # 获取短哈希，用于版本号
          COMMIT_SHORT_HASH=$(git rev-parse --short HEAD)
          # 获取完整哈希，用于信息展示和比对
          COMMIT_FULL_HASH=$(git rev-parse HEAD)
          # 获取最新 Commit 的日期
          COMMIT_DATE=$(git log -1 --format=%cd --date=format:'%Y-%m-%d %H:%M:%S')
          # 生成唯一的构建日期标签（UTC时间）
          BUILD_DATE_TAG=$(date -u +'%Y%m%d-%H%M%S')
          # 组合成最终的版本号，格式为：yyds-ph-日期-哈希
          VERSION_TAG="yyds-ph-${BUILD_DATE_TAG}-${COMMIT_SHORT_HASH}"
          
          # 使用 GITHUB_OUTPUT 将变量传递给后续步骤
          echo "version=${VERSION_TAG}" >> $GITHUB_OUTPUT
          echo "commit_date=${COMMIT_DATE}" >> $GITHUB_OUTPUT
          echo "commit_hash=${COMMIT_FULL_HASH}" >> $GITHUB_OUTPUT

      # 第3步：检查是否需要进行新的构建
      - name: 检查是否需要构建
        id: check_build
        run: |
          CURRENT_COMMIT="${{ steps.version.outputs.commit_hash }}"
          # 关键：直接用 if 语句捕获 gh 命令的成功/失败状态，避免在 Release 不存在时因脚本退出而报错
          if LATEST_RELEASE_BODY=$(gh release view mosdns --json body -q .body); then
            # 如果 Release 存在，则从中提取上次构建的 Commit Hash 进行比对
            LAST_COMMIT=$(echo "$LATEST_RELEASE_BODY" | grep '代码提交哈希 (Commit Hash):' | awk '{print $NF}')
            if [ "$CURRENT_COMMIT" == "$LAST_COMMIT" ]; then
              # 如果当前 Commit 和上次构建的 Commit 相同，则无需构建
              echo "最新的 Commit ${CURRENT_COMMIT} 已经构建过了，跳过本次任务。"
              echo "build_required=false" >> $GITHUB_OUTPUT
            else
              # 否则，需要构建新版本
              echo "发现新的 Commit ${CURRENT_COMMIT}，需要进行构建。"
              echo "build_required=true" >> $GITHUB_OUTPUT
            fi
          else
            # 如果 gh 命令失败（即 Release 不存在），说明是首次构建，需要构建
            echo "未找到 tag 为 'mosdns' 的 Release，需要进行构建。"
            echo "build_required=true" >> $GITHUB_OUTPUT
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 第4步：安装 Go 环境
      - name: 安装 Go 环境
        if: steps.check_build.outputs.build_required == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      # 第5步：安装 Python 环境 (mosdns 的编译脚本需要)
      - name: 安装 Python 环境
        if: steps.check_build.outputs.build_required == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 新增步骤：动态修改 release.py 文件以注入版本逻辑
      # 这个步骤会在运行时修改 mosdns/release/release.py 文件
      - name: 动态修改 release.py
        if: steps.check_build.outputs.build_required == 'true'
        run: |
          cd mosdns/release
          
          # 使用 Python 脚本动态修改 release.py
          # 核心思想是替换原始文件中获取版本号的代码块
          python -c "
import os
import re
import sys

file_path = 'release.py'

# 读取文件内容
try:
    with open(file_path, 'r') as f:
        content = f.read()
except IOError:
    print(f'Error: Could not read {file_path}. Exiting.')
    sys.exit(1)

# 构建要插入的新版本逻辑块
# 这个字符串会替换掉原始的 'VERSION = 'dev/unknown'' 及后面的 try/except 块
# 注意：f-string 内部的花括号和引号需要转义或小心处理
new_version_logic = '''
    custom_version_from_env = os.getenv('TAG_NAME')
    if custom_version_from_env:
        VERSION = custom_version_from_env
        logger.info(f'Using custom version from TAG_NAME environment variable: {{VERSION}}')
    else:
        # Original version logic starts here
        VERSION = 'dev/unknown'
        try:
            # Modified git describe command with cwd='../'
            VERSION = subprocess.check_output('git describe --tags --long --always', shell=True, cwd='../').decode().rstrip()
        except subprocess.CalledProcessError as e:
            logger.error(f'get git tag failed: {{e.args}}')
        # Original version logic ends here
'''

# 查找并替换整个版本获取块
# 这个正则表达式是根据你提供的原始 release.py 内容编写的。
# 它匹配从 'VERSION = 'dev/unknown'' 开始，到 'logger.error(f'get git tag failed: {e.args}')' 结束的整个块。
# re.DOTALL 标志让 '.' 也匹配换行符。
# 请注意：如果原始文件结构有变动，这个正则匹配可能会失效。
pattern = r"VERSION = 'dev\/unknown'\s*try:\s*VERSION = subprocess\.check_output\('git describe --tags --long --always', shell=True\)\.decode\(\)\.rstrip\(\)\s*except subprocess\.CalledProcessError as e:\s*logger\.error\(f'get git tag failed: {e\.args}'\)"

# 替换匹配到的部分
# re.sub 会替换所有匹配项，但我们期望只有一个
modified_content = re.sub(pattern, new_version_logic, content, flags=re.DOTALL | re.MULTILINE)

# 检查是否进行了替换
if content == modified_content:
    print('Error: No replacement was made. The pattern might not have matched. This usually means the original release.py has changed its versioning logic or formatting.')
    print('Please check the `动态修改 release.py` step in your workflow and adjust the Python regex.')
    sys.exit(1) # 如果没有替换成功，则退出，因为版本注入会失败

# 写回文件
try:
    with open(file_path, 'w') as f:
        f.write(modified_content)
    print(f'Successfully patched {file_path}.')
except IOError:
    print(f'Error: Could not write to {file_path}. Exiting.')
    sys.exit(1)
          "
          
          # 验证修改 (强烈建议在调试时启用)
          echo "--- Modified release.py content ---"
          cat release.py
          echo "-----------------------------------"

      # 第6步：使用自定义版本号进行编译 (现在 release.py 已被修改)
      - name: 编译
        if: steps.check_build.outputs.build_required == 'true'
        run: |
          cd mosdns
          # TAG_NAME 环境变量仍然需要设置，因为修改后的 release.py 会去读取它
          python ./release/release.py
        env:
          CGO_ENABLED: '0'
          TAG_NAME: ${{ steps.version.outputs.version }} # 这是传递给 release.py 的环境变量

      # 第7步：发布或更新 GitHub Release
      - name: 发布到 Release
        if: steps.check_build.outputs.build_required == 'true'
        uses: softprops/action-gh-release@v2
        with:
          # 关键：使用固定的 "mosdns" 标签，以便为其他脚本提供一个稳定的下载地址
          tag_name: mosdns
          # Release 的标题使用唯一的版本号，方便在 GitHub UI 上区分
          name: "MosDNS (构建版本: ${{ steps.version.outputs.version }})"
          # Release 的正文包含详细信息，尤其是 Commit Hash，用于下次运行时进行比对
          body: |
            **这是最新的自动构建版本。**
            
            - **构建版本号 (Build Version)**: `${{ steps.version.outputs.version }}`
            - **代码提交时间 (Commit Time)**: `${{ steps.version.outputs.commit_date }}`
            - **代码提交哈希 (Commit Hash)**: `${{ steps.version.outputs.commit_hash }}`
            
            *此 Release 由 GitHub Actions 自动更新，并始终指向最新的构建。*
          # 上传 release 目录下所有 .zip 文件
          files: './mosdns/release/mosdns*.zip'
          prerelease: false
          # 始终将此 Release 标记为 "Latest"
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
