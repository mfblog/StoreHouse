name: Release mosdns

on:
  workflow_dispatch:  # 保留手动触发
  schedule:
    - cron: "30 20 * * *"  # 保留定时任务
  push:
    branches:
      - latest  # 仅监控latest分支
    paths:
      - ".github/workflows/mosdns.yaml"

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Clone mosdns repository
        uses: actions/checkout@v4
        with:
          repository: yyysuo/mosdns
          path: mosdns
          fetch-depth: 0 # 必须获取所有历史记录才能正确生成版本信息

      - name: Generate Version and Commit Info
        id: version
        run: |
          cd mosdns
          # 获取短哈希和完整哈希
          COMMIT_SHORT_HASH=$(git rev-parse --short HEAD)
          COMMIT_FULL_HASH=$(git rev-parse HEAD)
          
          # 获取 Commit 日期
          COMMIT_DATE=$(git log -1 --format=%cd --date=format:'%Y-%m-%d %H:%M:%S')
          
          # 生成用于版本号的日期字符串 (例如: 20231027-153000)
          BUILD_DATE_TAG=$(date -u +'%Y%m%d-%H%M%S')
          
          # 组合最终版本号
          VERSION_TAG="Build-${BUILD_DATE_TAG}-${COMMIT_SHORT_HASH}"
          
          # 使用 GITHUB_OUTPUT 将变量传递给后续步骤
          echo "version=${VERSION_TAG}" >> $GITHUB_OUTPUT
          echo "commit_date=${COMMIT_DATE}" >> $GITHUB_OUTPUT
          echo "commit_hash=${COMMIT_FULL_HASH}" >> $GITHUB_OUTPUT
          
          echo "Generated Version: ${VERSION_TAG}"
          echo "Commit Date: ${COMMIT_DATE}"
          echo "Commit Hash: ${COMMIT_FULL_HASH}"

      - name: Check if release for this commit already exists
        id: check_release
        run: |
          # gh release view 会检查具有特定tag的release。我们用tag来检查唯一性。
          # 我们使用版本号作为tag，如果这个tag的release已存在，则跳过后续步骤。
          if gh release view "${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "Release for tag ${{ steps.version.outputs.version }} already exists. Skipping build."
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "Release for tag ${{ steps.version.outputs.version }} does not exist. Proceeding with build."
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        if: steps.check_release.outputs.exists == 'false'
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          check-latest: true
          cache: true

      - name: Set up Python
        if: steps.check_release.outputs.exists == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build with custom version
        if: steps.check_release.outputs.exists == 'false'
        run: |
          cd mosdns
          python ./release.py
        env:
          CGO_ENABLED: '0'
          # 关键步骤: 将生成的版本号作为环境变量传递给编译脚本
          TAG_NAME: ${{ steps.version.outputs.version }}

      - name: Publish Release
        if: steps.check_release.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          # 使用我们生成的版本号作为 release 的 tag
          tag_name: ${{ steps.version.outputs.version }}
          name: "MosDNS ${{ steps.version.outputs.version }}"
          body: |
            **A new build of mosdns from the latest commit.**
            
            - **源码 (mosdns) Commit 时间**: `${{ steps.version.outputs.commit_date }}`
            - **版本号 (Version)**: `${{ steps.version.outputs.version }}`
            - **源码 (mosdns) Commit Hash**: `${{ steps.version.outputs.commit_hash }}`
            
            *This release was automatically generated by GitHub Actions.*
          files: './mosdns/release/mosdns*.zip'
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
