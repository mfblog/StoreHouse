name: Release mosdns

on:
  workflow_dispatch:  # 允许手动触发
  schedule:
    - cron: "30 20 * * *"  # 定时触发
  push:
    branches:
      - latest  # 仅监控 latest 分支
    paths:
      - ".github/workflows/mosdns.yaml" # 当工作流文件本身改变时也触发

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Clone mosdns repository
        uses: actions/checkout@v4
        with:
          repository: yyysuo/mosdns
          path: mosdns
          fetch-depth: 0

      - name: Generate Unique Version and Commit Info
        id: version
        run: |
          cd mosdns
          COMMIT_SHORT_HASH=$(git rev-parse --short HEAD)
          COMMIT_FULL_HASH=$(git rev-parse HEAD)
          COMMIT_DATE=$(git log -1 --format=%cd --date=format:'%Y-%m-%d %H:%M:%S')
          BUILD_DATE_TAG=$(date -u +'%Y%m%d-%H%M%S')
          VERSION_TAG="yyds-ph-${BUILD_DATE_TAG}-${COMMIT_SHORT_HASH}"
          
          echo "version=${VERSION_TAG}" >> $GITHUB_OUTPUT
          echo "commit_date=${COMMIT_DATE}" >> $GITHUB_OUTPUT
          echo "commit_hash=${COMMIT_FULL_HASH}" >> $GITHUB_OUTPUT
          
          echo "Generated Unique Version for TG: ${VERSION_TAG}"

      - name: Check if a new build is needed
        id: check_build
        run: |
          CURRENT_COMMIT="${{ steps.version.outputs.commit_hash }}"
          if LATEST_RELEASE_BODY=$(gh release view mosdns --json body -q .body); then
            echo "Found existing 'mosdns' release. Checking commit hash..."
            LAST_COMMIT=$(echo "$LATEST_RELEASE_BODY" | grep 'Commit Hash:' | awk '{print $NF}')
            if [ "$CURRENT_COMMIT" == "$LAST_COMMIT" ]; then
              echo "The latest commit ${CURRENT_COMMIT} has already been built. Skipping."
              echo "build_required=false" >> $GITHUB_OUTPUT
            else
              echo "New commit ${CURRENT_COMMIT} found. Last built commit was ${LAST_COMMIT}. A new build is required."
              echo "build_required=true" >> $GITHUB_OUTPUT
            fi
          else
            echo "Release 'mosdns' not found. A new build is required."
            echo "build_required=true" >> $GITHUB_OUTPUT
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        if: steps.check_build.outputs.build_required == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Set up Python
        if: steps.check_build.outputs.build_required == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build with custom version
        if: steps.check_build.outputs.build_required == 'true'
        run: |
          cd mosdns
          python ./release.py
        env:
          CGO_ENABLED: '0'
          TAG_NAME: ${{ steps.version.outputs.version }}

      - name: Publish/Update GitHub Release with fixed tag
        id: create_release
        if: steps.check_build.outputs.build_required == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: mosdns
          name: "MosDNS (Build: ${{ steps.version.outputs.version }})"
          body: |
            **This is the latest automated build.**
            
            - **Build Version**: `${{ steps.version.outputs.version }}`
            - **Commit Time**: `${{ steps.version.outputs.commit_date }}`
            - **Commit Hash**: `${{ steps.version.outputs.commit_hash }}`
            
            *This release is automatically updated and always points to the latest build.*
          files: './mosdns/release/mosdns*.zip'
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload all files to Telegram in batches
        if: steps.check_build.outputs.build_required == 'true'
        run: |
          # 黄金调试法则：检查文件是否存在以及路径是否正确
          echo "--- Listing files in release directory ---"
          ls -lR ./mosdns/release/
          echo "----------------------------------------"

          # 使用 HEREDOC 安全地定义包含多行和特殊字符的 caption
          # 这个 caption 只会用于第一批的第一个文件
          read -r -d '' CAPTION << EOF
          *MosDNS 新版本已编译完成！* 🚀

          *版本号*: \`${{ steps.version.outputs.version }}\`
          *Commit Hash*: \`${{ steps.version.outputs.commit_hash }}\`

          *GitHub Release (固定链接)*: [点击查看](${{ steps.create_release.outputs.html_url }})
          EOF

          # 使用 shopt -s nullglob 避免在没有匹配文件时出现字面上的 "*.zip"
          shopt -s nullglob
          files=(./mosdns/release/*.zip)
          shopt -u nullglob

          if [ ${#files[@]} -eq 0 ]; then
            echo "No .zip files found to upload."
            exit 0
          fi

          # 按每批10个文件进行分批发送
          for (( i=0; i<${#files[@]}; i+=10 )); do
            # 获取当前批次的文件 (最多10个)
            chunk=("${files[@]:i:10}")
            
            echo "--- Preparing to send batch $((i/10 + 1)) with ${#chunk[@]} files ---"

            # 为当前批次初始化 curl 参数和 media JSON
            CURL_ARGS=(
              -s --fail -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMediaGroup"
              -F "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}"
            )
            MEDIA_JSON=$(jq -n '[]')
            
            # 遍历当前批次的文件
            for j in "${!chunk[@]}"; do
              file="${chunk[j]}"
              attachment_name="file${j}"
              
              CURL_ARGS+=(-F "$attachment_name=@$file")

              # 只有第一批的第一个文件 (i=0, j=0) 才添加 caption
              if [ $i -eq 0 ] && [ $j -eq 0 ]; then
                MEDIA_JSON=$(echo "$MEDIA_JSON" | jq \
                  --arg caption "$CAPTION" \
                  --arg media "attach://$attachment_name" \
                  '. + [{"type": "document", "media": $media, "caption": $caption, "parse_mode": "Markdown"}]')
              else
                MEDIA_JSON=$(echo "$MEDIA_JSON" | jq \
                  --arg media "attach://$attachment_name" \
                  '. + [{"type": "document", "media": $media}]')
              fi
            done

            # 将最终的 media JSON 添加到参数数组
            CURL_ARGS+=(-F "media=$MEDIA_JSON")

            # 安全地执行 curl 命令
            echo "Sending batch to Telegram..."
            response=$(curl "${CURL_ARGS[@]}")
            echo "Telegram API Response: $response"

            # 检查 API 是否返回了错误
            if ! echo "$response" | jq -e '.ok == true' > /dev/null; then
              echo "::error::Failed to send batch to Telegram."
              exit 1
            fi
            
            # 在批次之间短暂休眠，避免触发API速率限制
            sleep 2
          done
