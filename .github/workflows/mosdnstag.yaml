name: Release mosdns

on:
  workflow_dispatch:
  schedule:
    - cron: "30 20 * * *"
  push:
    branches:
      - latest
    paths:
      - ".github/workflows/mosdns.yaml"

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Clone mosdns repository
        uses: actions/checkout@v4
        with:
          repository: yyysuo/mosdns
          path: mosdns
          fetch-depth: 0

      - name: Generate Unique Version and Commit Info
        id: version
        run: |
          cd mosdns
          COMMIT_SHORT_HASH=$(git rev-parse --short HEAD)
          COMMIT_FULL_HASH=$(git rev-parse HEAD)
          COMMIT_DATE=$(git log -1 --format=%cd --date=format:'%Y-%m-%d %H:%M:%S')
          BUILD_DATE_TAG=$(date -u +'%Y%m%d-%H%M%S')
          VERSION_TAG="yyds-ph-${BUILD_DATE_TAG}-${COMMIT_SHORT_HASH}"
          
          echo "version=${VERSION_TAG}" >> $GITHUB_OUTPUT
          echo "commit_date=${COMMIT_DATE}" >> $GITHUB_OUTPUT
          echo "commit_hash=${COMMIT_FULL_HASH}" >> $GITHUB_OUTPUT
          
          echo "Generated Unique Version for TG: ${VERSION_TAG}"

      - name: Check if a new build is needed
        id: check_build
        run: |
          CURRENT_COMMIT="${{ steps.version.outputs.commit_hash }}"
          
          # 修正后的逻辑：使用 if...then...else... 来捕获 gh 命令的退出码
          # 这样即使 gh release view 失败（找不到 release），脚本也不会因为 `bash -e` 而退出
          if LATEST_RELEASE_BODY=$(gh release view mosdns --json body -q .body); then
            # 如果命令成功，说明 Release 存在，我们继续比较 commit
            echo "Found existing 'mosdns' release. Checking commit hash..."
            LAST_COMMIT=$(echo "$LATEST_RELEASE_BODY" | grep 'Commit Hash:' | awk '{print $NF}')
            
            if [ "$CURRENT_COMMIT" == "$LAST_COMMIT" ]; then
              echo "The latest commit ${CURRENT_COMMIT} has already been built. Skipping."
              echo "build_required=false" >> $GITHUB_OUTPUT
            else
              echo "New commit ${CURRENT_COMMIT} found. Last built commit was ${LAST_COMMIT}. A new build is required."
              echo "build_required=true" >> $GITHUB_OUTPUT
            fi
          else
            # 如果命令失败，说明 Release 不存在，这是首次构建
            echo "Release 'mosdns' not found. A new build is required."
            echo "build_required=true" >> $GITHUB_OUTPUT
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        if: steps.check_build.outputs.build_required == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          check-latest: true
          cache: true

      - name: Set up Python
        if: steps.check_build.outputs.build_required == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build with custom version
        if: steps.check_build.outputs.build_required == 'true'
        run: |
          cd mosdns
          python ./release.py
        env:
          CGO_ENABLED: '0'
          TAG_NAME: ${{ steps.version.outputs.version }}

      - name: Publish/Update GitHub Release with fixed tag
        id: create_release
        if: steps.check_build.outputs.build_required == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: mosdns
          name: "MosDNS (Build: ${{ steps.version.outputs.version }})"
          body: |
            **This is the latest automated build.**
            
            - **Build Version**: `${{ steps.version.outputs.version }}`
            - **Commit Time**: `${{ steps.version.outputs.commit_date }}`
            - **Commit Hash**: `${{ steps.version.outputs.commit_hash }}`
            
            *This release is automatically updated and always points to the latest build.*
          files: './mosdns/release/mosdns*.zip'
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload all files to Telegram in a single message
        if: steps.check_build.outputs.build_required == 'true'
        run: |
          API_URL="https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMediaGroup"
          CHAT_ID="${{ secrets.TELEGRAM_CHAT_ID }}"
          
          CURL_CMD="curl -s -X POST '$API_URL' -F chat_id='$CHAT_ID'"
          MEDIA_JSON="["
          i=0
          
          for file in ./mosdns/release/*.zip; do
            if [ -f "$file" ]; then
              i=$((i+1))
              attachment_name="file${i}"
              
              CURL_CMD="$CURL_CMD -F $attachment_name=@'$file'"
              
              if [ "$i" -gt 1 ]; then
                MEDIA_JSON="$MEDIA_JSON,"
              fi
              
              if [ "$i" -eq 1 ]; then
                CAPTION="*MosDNS 新版本已编译完成！* 🚀\n\n*版本号*: \`${{ steps.version.outputs.version }}\`\n*Commit Hash*: \`${{ steps.version.outputs.commit_hash }}\`\n\n*GitHub Release (固定链接)*: [点击查看](${{ steps.create_release.outputs.html_url }})"
                MEDIA_JSON="$MEDIA_JSON{\"type\":\"document\",\"media\":\"attach://$attachment_name\",\"caption\":\"$CAPTION\",\"parse_mode\":\"Markdown\"}"
              else
                MEDIA_JSON="$MEDIA_JSON{\"type\":\"document\",\"media\":\"attach://$attachment_name\"}"
              fi
            fi
          done
          
          MEDIA_JSON="$MEDIA_JSON]"
          CURL_CMD="$CURL_CMD -F media='$MEDIA_JSON'"
          
          echo "Sending files to Telegram..."
          eval $CURL_CMD
