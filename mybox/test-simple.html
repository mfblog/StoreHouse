<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyBox - 简化测试版</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@3.3.4/dist/vue.global.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: #f5f5f5; }
        .app { display: flex; min-height: 100vh; }
        .sidebar { width: 250px; background: white; padding: 20px; }
        .main { flex: 1; padding: 20px; }
        .nav-item { padding: 12px; cursor: pointer; margin: 4px 0; border-radius: 4px; }
        .nav-item:hover { background: #f0f0f0; }
        .nav-item.active { background: #4f46e5; color: white; }
        .card { background: white; border-radius: 8px; padding: 20px; margin: 20px 0; }
    </style>
</head>
<body>
    <div id="app" class="app">
        <div class="sidebar">
            <h2>📦 MyBox</h2>
            <div class="nav-item" :class="{ active: currentPage === 'home' }" @click="currentPage = 'home'">
                📊 仪表盘
            </div>
            <div class="nav-item" :class="{ active: currentPage === 'sing-box' }" @click="currentPage = 'sing-box'">
                🚀 Sing-Box
            </div>
            <div class="nav-item" :class="{ active: currentPage === 'mosdns' }" @click="currentPage = 'mosdns'">
                🌐 MosDNS
            </div>
        </div>
        
        <div class="main">
            <div v-if="currentPage === 'home'">
                <h1>🎯 仪表盘</h1>
                <div class="card">
                    <p>欢迎使用 MyBox 管理界面！</p>
                </div>
            </div>
            
            <div v-if="currentPage === 'sing-box'">
                <h1>🚀 Sing-Box 管理</h1>
                <div class="card">
                    <p>Sing-Box 配置管理</p>
                </div>
            </div>
            
            <div v-if="currentPage === 'mosdns'">
                <h1>🌐 MosDNS 管理</h1>
                <div class="card">
                    <p>MosDNS 服务管理</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        console.log('开始初始化Vue应用...');
        console.log('Vue对象:', Vue);
        
        if (!Vue) {
            console.error('Vue未加载！');
            document.body.innerHTML = '<div style="color: red; padding: 20px; font-size: 18px;">错误：Vue框架未加载！请检查网络连接。</div>';
            throw new Error('Vue未加载');
        }
        
        try {
            const { createApp, ref } = Vue;
            
            const app = createApp({
                setup() {
                    console.log('Vue setup函数执行中...');
                    
                    const currentPage = ref('home');
                    
                    return {
                        currentPage
                    };
                }
            });
            
            app.mount('#app');
            console.log('Vue应用挂载成功！');
            
        } catch (error) {
            console.error('Vue应用创建失败:', error);
            document.body.innerHTML = '<div style="color: red; padding: 20px; font-size: 18px;">错误：' + error.message + '</div>';
        }
    </script>
</body>
</html>
